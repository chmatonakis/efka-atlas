# Dependencies για Streamlit in Snowflake (Warehouse runtime)
# Μόνο πακέτα από το Snowflake Anaconda channel.
# pandas υπάρχει· pdfplumber μπορεί να μην υπάρχει - πρόσθεσέ το από Snowsight αν χρειαστεί.

dependencies:
  - python=3.11
  - pandas
  - openpyxl
  # Αν το pdfplumber δεν είναι διαθέσιμο, πρόσθεσέ το από Snowsight (Streamlit app → Dependencies)
  # ή χρησιμοποίησε Container runtime + requirements.txt
