# Snowflake project για Streamlit - Κύρια εφαρμογή ATLAS
# Προσάρμοσε: MY_WAREHOUSE, ATLAS_STAGE (ή MY_DB.MY_SCHEMA.ATLAS_STAGE) με τα ονόματα από Βήμα 1.1

definition_version: 2
entities:
  atlas_app:
    type: streamlit
    identifier: ATLAS_APP
    stage: ATLAS_STAGE
    query_warehouse: MY_WAREHOUSE
    main_file: app_final.py
    artifacts:
      - app_final.py
      - html_viewer_builder.py
      - html_extra_tabs.py
      - environment.yml

  # --- Εφαρμογές για ΤΕΣΤ (χωρίς να αγγίζουν τις επίσημες) ---
  atlas_app_test:
    type: streamlit
    identifier: ATLAS_APP_TEST
    stage: ATLAS_STAGE
    query_warehouse: MY_WAREHOUSE
    main_file: app_final.py
    artifacts:
      - app_final.py
      - html_viewer_builder.py
      - html_extra_tabs.py
      - environment.yml

  atlas_lite_test:
    type: streamlit
    identifier: ATLAS_LITE_TEST
    stage: ATLAS_STAGE
    query_warehouse: MY_WAREHOUSE
    main_file: app_lite.py
    artifacts:
      - app_lite.py
      - app_final.py
      - html_viewer_builder.py
      - environment.yml
